onlyBuiltDependencies:
  - esbuild
  - lightningcss

minimumReleaseAge: 0
networkTimeout: 0

overrides:
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest

peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"

allowBuilds:
  '@parcel/watcher': true
  esbuild: true
  msgpackr-extract: true
  msw: true
  sharp: true
  workerd: true
